services:
  frontend:
    image: hashicorp/http-echo:1.0.0
    command: ["-listen=:8080", "-text=hello from frontend"]
    labels:
      dnsvard.http_port: "8080"
      dnsvard.default_http: "true"

  api:
    image: hashicorp/http-echo:1.0.0
    command: ["-listen=:8080", "-text=hello from api"]
    labels:
      dnsvard.http_port: "8080"

  postgres:
    image: postgres:18.2-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -h 127.0.0.1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  postgres-data:
