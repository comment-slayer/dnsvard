name: Landing Page

on:
  push:
    branches:
      - master
    paths:
      - "www/**"
      - ".github/workflows/landing-page.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: landing-page-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build landing page
        run: |
          set -eu
          bun install --cwd www --frozen-lockfile
          bun run --cwd www build
          bunx wrangler pages functions build "www/functions" --outdir "www/.pages-worker" --build-output-directory "www/dist"
          cp "www/.pages-worker/index.js" "www/dist/_worker.js"

      - name: Check Cloudflare Pages credentials
        id: cloudflare-pages-creds
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -eu
          if [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            printf 'error: missing required secret CLOUDFLARE_ACCOUNT_ID\n' >&2
            exit 1
          fi

          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            printf 'warning: CLOUDFLARE_API_TOKEN not set; skipping Cloudflare Pages deploy\n' >&2
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "deploy=true" >> "$GITHUB_OUTPUT"

      - name: Deploy landing page to Cloudflare Pages
        if: steps.cloudflare-pages-creds.outputs.deploy == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -eu
          attempt=1
          max_attempts=5
          while [ "$attempt" -le "$max_attempts" ]; do
            if bunx wrangler pages deploy "www/dist" --project-name "dnsvard" --branch master; then
              exit 0
            fi

            if [ "$attempt" -eq "$max_attempts" ]; then
              printf 'error: Cloudflare Pages deploy failed after %s attempts\n' "$max_attempts" >&2
              exit 1
            fi

            sleep_seconds=$((attempt * 2))
            printf 'warning: deploy attempt %s failed, retrying in %ss\n' "$attempt" "$sleep_seconds" >&2
            sleep "$sleep_seconds"
            attempt=$((attempt + 1))
          done
