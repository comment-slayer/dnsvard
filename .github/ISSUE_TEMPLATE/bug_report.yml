name: Bug report
description: Report a reproducible problem
title: "bug: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Include commands, config, and compose labels.
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: doctor
    attributes:
      label: dnsvard doctor output
      render: shell

  - type: input
    id: os
    attributes:
      label: OS version
      placeholder: macOS 15.x
    validations:
      required: true
